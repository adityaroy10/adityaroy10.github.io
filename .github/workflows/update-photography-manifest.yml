# When images are added to photography/images/, update photography/images.json automatically.
name: Update photography manifest

on:
  push:
    branches: [main]
    paths:
      - 'photography/images/**'
      - 'scripts/update-photography-manifest.js'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update images.json
        run: node scripts/update-photography-manifest.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add photography/images.json
          git diff --staged --quiet || (git commit -m "chore: update photography manifest from images directory" && git push)
